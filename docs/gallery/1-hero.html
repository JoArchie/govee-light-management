<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Gallery 1 — Hero</title><link rel="stylesheet" href="./shared.css">
<style>
  .wrap {
    width: 1920px; height: 1080px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 140px;
  }
  .left { max-width: 760px; }
  .left .eyebrow { margin-bottom: 30px; }
  .left h1 {
    font-size: 92px;
    font-weight: 800;
    letter-spacing: -0.025em;
    line-height: 1.02;
    margin-bottom: 36px;
  }
  .left p {
    font-size: 26px;
    color: var(--muted);
    line-height: 1.5;
    max-width: 680px;
  }
  .right {
    width: 820px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 40px;
    filter: drop-shadow(0 30px 80px rgba(168,85,247,0.25));
  }
  .right img {
    width: 100%;
    aspect-ratio: 1;
    filter: drop-shadow(0 10px 30px rgba(0,0,0,0.4));
  }
</style></head>
<body>
<div class="wrap">
  <div class="left">
    <span class="eyebrow">Stream Deck Plugin</span>
    <h1>Tactile <span class="grad-text">smart light</span> control</h1>
    <p>Toggle lights, scrub colors, dial in warmth, and paint every segment of your RGB IC strip — all from your Stream Deck, without touching your phone.</p>
  </div>
  <div class="right">
    <img src="./assets/light.svg" alt="">
    <img src="./assets/brightness.svg" alt="">
    <img src="./assets/color.svg" alt="">
    <img src="./assets/colortemp.svg" alt="">
  </div>
</div>
<div class="brand-footer">
  <img src="./assets/light.svg" alt="">
  Govee Light Management
</div>
</body></html>
