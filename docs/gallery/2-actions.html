<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Gallery 2 — Actions</title><link rel="stylesheet" href="./shared.css">
<style>
  .wrap {
    width: 1920px; height: 1080px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 0 120px;
  }
  .head { text-align: center; margin-bottom: 90px; }
  .eyebrow { margin-bottom: 24px; }
  h1 {
    font-size: 78px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.05;
    margin-bottom: 24px;
  }
  .sub {
    font-size: 24px;
    color: var(--muted);
    max-width: 780px;
    margin: 0 auto;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 50px;
    width: 100%;
    max-width: 1500px;
  }
  .item {
    display: flex; flex-direction: column; align-items: center; gap: 22px;
  }
  .item img {
    width: 200px; height: 200px;
    filter: drop-shadow(0 20px 50px rgba(168,85,247,0.35));
  }
  .item .label {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    text-align: center;
  }
</style></head>
<body>
<div class="wrap">
  <div class="head">
    <span class="eyebrow">What's inside</span>
    <h1>Five essential <span class="grad-text">actions</span></h1>
    <p class="sub">Purpose-built for keypads. Every control you need, one tap away.</p>
  </div>
  <div class="grid">
    <div class="item"><img src="./assets/light.svg" alt=""><div class="label">On / Off</div></div>
    <div class="item"><img src="./assets/brightness.svg" alt=""><div class="label">Brightness</div></div>
    <div class="item"><img src="./assets/color.svg" alt=""><div class="label">Color</div></div>
    <div class="item"><img src="./assets/colortemp.svg" alt=""><div class="label">Color Temp</div></div>
    <div class="item"><img src="./assets/segment-color.svg" alt=""><div class="label">Segments</div></div>
  </div>
</div>
<div class="brand-footer">
  <img src="./assets/light.svg" alt="">
  Govee Light Management
</div>
</body></html>
