<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Color wheel icon - white on transparent -->
  <!-- Outer ring -->
  <circle cx="20" cy="20" r="15" fill="none" stroke="#fff" stroke-width="2.5"/>
  <!-- Inner circle -->
  <circle cx="20" cy="20" r="6" fill="none" stroke="#fff" stroke-width="2"/>
  <!-- Dividing spokes (6 segments like a color wheel) -->
  <line x1="20" y1="5" x2="20" y2="14" stroke="#fff" stroke-width="1.5"/>
  <line x1="33" y1="12.5" x2="25.2" y2="17" stroke="#fff" stroke-width="1.5"/>
  <line x1="33" y1="27.5" x2="25.2" y2="23" stroke="#fff" stroke-width="1.5"/>
  <line x1="20" y1="35" x2="20" y2="26" stroke="#fff" stroke-width="1.5"/>
  <line x1="7" y1="27.5" x2="14.8" y2="23" stroke="#fff" stroke-width="1.5"/>
  <line x1="7" y1="12.5" x2="14.8" y2="17" stroke="#fff" stroke-width="1.5"/>
</svg>
