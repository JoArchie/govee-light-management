<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <rect width="144" height="144" rx="16" fill="#00ABE7"/>
  <!-- Double music note -->
  <!-- Left note head -->
  <ellipse cx="54" cy="92" rx="12" ry="9" transform="rotate(-20, 54, 92)" fill="#fff"/>
  <!-- Right note head -->
  <ellipse cx="94" cy="84" rx="12" ry="9" transform="rotate(-20, 94, 84)" fill="#fff"/>
  <!-- Left stem -->
  <rect x="63" y="40" width="5" height="52" fill="#fff"/>
  <!-- Right stem -->
  <rect x="103" y="32" width="5" height="52" fill="#fff"/>
  <!-- Top beam -->
  <rect x="63" y="36" width="45" height="6" rx="2" fill="#fff" transform="rotate(-6, 63, 39)"/>
  <!-- Bottom beam -->
  <rect x="63" y="48" width="45" height="6" rx="2" fill="#fff" transform="rotate(-6, 63, 51)"/>
</svg>
