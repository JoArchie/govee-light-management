    <line x1="6" y1="20" x2="18" y2="20" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="7" y1="24" x2="17" y2="24" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
  </g>
  <!-- Center bulb (slightly higher) -->
  <g transform="translate(60, 50)">
    <path d="M0 0 A12 12 0 1 1 24 0 Q24 12 20 16 L4 16 Q0 12 0 0Z" fill="none" stroke="#fff" stroke-width="3.5" stroke-linejoin="round"/>
    <line x1="6" y1="20" x2="18" y2="20" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="7" y1="24" x2="17" y2="24" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
  </g>
  <!-- Right bulb -->
  <g transform="translate(84, 62)">
    <path d="M0 0 A12 12 0 1 1 24 0 Q24 12 20 16 L4 16 Q0 12 0 0Z" fill="none" stroke="#fff" stroke-width="3.5" stroke-linejoin="round"/>
    <line x1="6" y1="20" x2="18" y2="20" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="7" y1="24" x2="17" y2="24" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
