<!DOCTYPE html>
<html>
<head lang="en-gb">
	<meta charset="utf-8">
	<title>Govee Light Management | Music Mode</title>
	<link rel="stylesheet" href="./css/main.css" />
	<script src="./js/sdpi-components.js"></script>
	<script src="./js/setup.js"></script>
</head>
<body>
	<div id="settings" class="hidden">
		<sdpi-item label="Device">
			<select id="deviceSelect" class="sdpi-item-value select"><option value="">Select a device...</option></select>
			<button id="refreshDevices" style="margin-top:4px;cursor:pointer">↻ Refresh</button>
		</sdpi-item>

		<sdpi-item label="Mode">
			<sdpi-select setting="musicMode" placeholder="" default="rhythm">
				<option value="rhythm">Rhythm</option>
				<option value="energic">Energic</option>
				<option value="spectrum">Spectrum</option>
				<option value="rolling">Rolling</option>
			</sdpi-select>
		</sdpi-item>

		<sdpi-item label="Sensitivity">
			<sdpi-range setting="sensitivity" default="50" min="0" max="100" step="1" showlabels></sdpi-range>
		</sdpi-item>

		<sdpi-item label="Auto Color">
			<sdpi-checkbox setting="autoColor" default="true"></sdpi-checkbox>
		</sdpi-item>
	</div>

	<div id="setup" class="hidden">
		<sdpi-item label="API Key">
			<sdpi-password id="apiKey" global setting="unverifiedApiKey"
				placeholder="API key from Govee"></sdpi-password>
		</sdpi-item>
		<sdpi-item>
			<sdpi-button id="connect">Connect</sdpi-button>
			<div id="errorMessage" class="hidden">Failed to connect, please try again.</div>
		</sdpi-item>
		<sdpi-item label="Guide" class="guide">
			<ol>
				<li>Open the Govee app</li>
				<li>Go to settings</li>
				<li>Select "Apply for API Key"</li>
			</ol>
		</sdpi-item>
	</div>
</body>
</html>
