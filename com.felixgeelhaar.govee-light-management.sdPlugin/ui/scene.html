<!DOCTYPE html>
<html>
<head lang="en-gb">
	<meta charset="utf-8">
	<title>Govee Light Management | Scene</title>
	<link rel="stylesheet" href="./css/main.css" />
	<script src="./js/ws-bridge.js"></script>
	<script src="./js/sdpi-components.js"></script>
	<script src="./js/setup.js"></script>
</head>
<body>
	<div id="settings" class="hidden">
		<sdpi-item label="Device">
			<sdpi-select id="deviceSelect" setting="selectedDeviceId" placeholder="" datasource="getDevices"
				show-refresh label-setting="selectedLightName"></sdpi-select>
		</sdpi-item>

		<sdpi-item label="Scene">
			<select id="sceneSelect" class="sdpi-item-value">
				<option value="" disabled selected>Select a device first</option>
			</select>
		</sdpi-item>
	</div>

	<div id="setup" class="hidden">
		<sdpi-item label="API Key">
			<sdpi-password id="apiKey" global setting="unverifiedApiKey"
				placeholder="API key from Govee"></sdpi-password>
		</sdpi-item>
		<sdpi-item>
			<sdpi-button id="connect">Connect</sdpi-button>
			<div id="errorMessage" class="hidden">Failed to connect, please try again.</div>
		</sdpi-item>
		<sdpi-item label="Guide" class="guide">
			<ol>
				<li>Open the Govee app</li>
				<li>Go to settings</li>
				<li>Select "Apply for API Key"</li>
			</ol>
		</sdpi-item>
	</div>

	<script>
		document.addEventListener("DOMContentLoaded", () => {
			const deviceSelect = document.getElementById("deviceSelect");
			const sceneSelect = document.getElementById("sceneSelect");
			let currentDeviceId = null;
			let savedSceneId = null;
			let savedSceneParamId = null;
			let savedSceneName = null;

			// Load saved scene settings
			const check = setInterval(() => {
				if (typeof SDPIComponents === "undefined" || !SDPIComponents.streamDeckClient) return;
				clearInterval(check);

				SDPIComponents.streamDeckClient.didReceiveSettings.subscribe((msg) => {
					const s = msg.payload?.settings;
					if (s) {
						savedSceneId = s.sceneId;
						savedSceneParamId = s.sceneParamId;
						savedSceneName = s.sceneName;
						// If device is already selected, fetch scenes
						if (s.selectedDeviceId && s.selectedDeviceId !== currentDeviceId) {
							currentDeviceId = s.selectedDeviceId;
							sendToPlugin({ event: "getScenes", deviceId: s.selectedDeviceId });
						}
					}
				});
			}, 50);

			// When device changes, fetch scenes for that device
			deviceSelect.addEventListener("valuechange", () => {
				const val = deviceSelect.value;
				if (val && val !== currentDeviceId) {
					currentDeviceId = val;
					sceneSelect.innerHTML = '<option value="" disabled selected>Loading scenes...</option>';
					sendToPlugin({ event: "getScenes", deviceId: val });
				}
			});

			// When scene is selected, save to settings
			sceneSelect.addEventListener("change", () => {
				const opt = sceneSelect.selectedOptions[0];
				if (!opt || !opt.dataset.id) return;
				SDPIComponents.streamDeckClient.setSettings({
					sceneId: parseInt(opt.dataset.id, 10),
					sceneParamId: parseInt(opt.dataset.paramid, 10),
					sceneName: opt.textContent,
				});
			});

			// Receive scenes from plugin
			document.addEventListener("sdpi:message", (evt) => {
				const p = evt.detail || {};
				if (p.event !== "scenesReceived") return;

				const scenes = p.scenes || [];
				sceneSelect.innerHTML = "";

				if (scenes.length === 0) {
					sceneSelect.innerHTML = '<option value="" disabled selected>No scenes available</option>';
					return;
				}

				scenes.forEach((s) => {
					const opt = document.createElement("option");
					opt.value = s.id + "|" + s.paramId;
					opt.textContent = s.name;
					opt.dataset.id = String(s.id);
					opt.dataset.paramid = String(s.paramId);
					// Restore saved selection
					if (savedSceneId === s.id && savedSceneParamId === s.paramId) {
						opt.selected = true;
					}
					sceneSelect.appendChild(opt);
				});

				// If no saved selection, show placeholder
				if (!sceneSelect.value) {
					const placeholder = document.createElement("option");
					placeholder.value = "";
					placeholder.disabled = true;
					placeholder.selected = true;
					placeholder.textContent = "Select a scene";
					sceneSelect.prepend(placeholder);
				}
			});
		});
	</script>
</body>
</html>
