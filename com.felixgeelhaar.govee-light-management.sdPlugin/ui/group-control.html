<!DOCTYPE html>
<html>
<head lang="en-gb">
	<meta charset="utf-8">
	<title>Govee Light Management | Group Control</title>
	<link rel="stylesheet" href="./css/main.css" />
	<script src="./js/sdpi-components.js"></script>
	<script src="./js/setup.js"></script>
	<style>
		#createGroupPanel { margin-top: 8px; }
		.light-list { max-height: 150px; overflow-y: auto; padding: 4px 0; }
		.light-list label { display: flex; align-items: center; padding: 3px 8px; cursor: pointer; }
		.light-list label:hover { background: rgba(255,255,255,0.05); }
		.light-list input[type="checkbox"] { margin-right: 8px; }
		.group-name-input { width: 100%; padding: 4px 8px; background: #3a3a3c; border: 1px solid #555; border-radius: 4px; color: #ddd; font-size: 12px; }
		.btn-row { display: flex; gap: 6px; margin-top: 6px; }
		.btn-row button { flex: 1; padding: 4px 8px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
		.btn-create { background: #0078d4; color: #fff; }
		.btn-cancel { background: #555; color: #ddd; }
		.btn-delete { background: #c42b1c; color: #fff; font-size: 11px; padding: 2px 6px; border: none; border-radius: 3px; cursor: pointer; margin-left: 6px; }
		.group-header { display: flex; align-items: center; justify-content: space-between; }
		.status-msg { padding: 4px 8px; font-size: 11px; border-radius: 3px; margin-top: 4px; }
		.status-msg.success { color: #4ec94e; }
		.status-msg.error { color: #ff6b6b; }
	</style>
	<script>
		document.addEventListener("DOMContentLoaded", () => {
			let groups = [];
			let devices = [];
			let client = null;

			const groupSelect = document.getElementById("groupSelect");
			const createBtn = document.getElementById("createGroupBtn");
			const deleteBtn = document.getElementById("deleteGroupBtn");
			const createPanel = document.getElementById("createGroupPanel");
			const lightList = document.getElementById("lightList");
			const groupNameInput = document.getElementById("groupNameInput");
			const saveBtn = document.getElementById("saveGroupBtn");
			const cancelBtn = document.getElementById("cancelGroupBtn");
			const statusMsg = document.getElementById("groupStatus");

			function showStatus(msg, isError) {
				statusMsg.textContent = msg;
				statusMsg.className = "status-msg " + (isError ? "error" : "success");
				setTimeout(() => { statusMsg.textContent = ""; }, 3000);
			}

			function populateGroupSelect() {
				groupSelect.innerHTML = '<option value="">Select a group...</option>';
				groups.forEach(g => {
					const opt = document.createElement("option");
					opt.value = g.id;
					opt.textContent = g.name + " (" + g.lightCount + " lights)";
					groupSelect.appendChild(opt);
				});
				// Restore saved selection
				if (client) {
					client.getSettings?.();
				}
			}

			function showCreatePanel() {
				// Populate light checkboxes from discovered devices
				lightList.innerHTML = "";
				if (devices.length === 0) {
					lightList.innerHTML = '<div style="padding:4px 8px;color:#999">No devices found. Connect API key first.</div>';
					return;
				}
				devices.forEach(d => {
					const label = document.createElement("label");
					const cb = document.createElement("input");
					cb.type = "checkbox";
					cb.value = d.value;
					cb.name = "groupLights";
					label.appendChild(cb);
					label.appendChild(document.createTextNode(d.label));
					lightList.appendChild(label);
				});
				groupNameInput.value = "";
				createPanel.style.display = "";
			}

			// Group select change -> save to settings
			groupSelect.addEventListener("change", () => {
				const selected = groups.find(g => g.id === groupSelect.value);
				if (client && selected) {
					client.setSettings({
						selectedGroupId: selected.id,
						selectedGroupName: selected.name
					});
				}
			});

			createBtn.addEventListener("click", () => showCreatePanel());
			cancelBtn.addEventListener("click", () => { createPanel.style.display = "none"; });

			saveBtn.addEventListener("click", () => {
				const name = groupNameInput.value.trim();
				const checked = [...document.querySelectorAll('input[name="groupLights"]:checked')];
				const lightIds = checked.map(cb => cb.value);

				if (!name) { showStatus("Enter a group name", true); return; }
				if (lightIds.length === 0) { showStatus("Select at least one light", true); return; }

				// Send to plugin backend
				if (client) {
					client.sendToPlugin({
						event: "saveGroup",
						group: { name, lightIds }
					});
				}
			});

			deleteBtn.addEventListener("click", () => {
				const groupId = groupSelect.value;
				if (!groupId) { showStatus("Select a group first", true); return; }
				if (!confirm("Delete this group?")) return;

				if (client) {
					client.sendToPlugin({
						event: "deleteGroup",
						groupId
					});
				}
			});

			// Wait for SDPI
			const check = setInterval(() => {
				if (typeof SDPIComponents === "undefined" || !SDPIComponents.streamDeckClient) return;
				clearInterval(check);
				client = SDPIComponents.streamDeckClient;

				// Load groups when we get the groups response
				client.sendToPropertyInspector?.subscribe((msg) => {
					const payload = msg.payload || msg;

					if (payload.event === "getGroups" && payload.items) {
						// SDPI datasource format
						groups = payload.items.map(item => ({
							id: item.value,
							name: item.label,
							lightCount: 0
						}));
						populateGroupSelect();
					}

					if (payload.event === "groupsReceived" && payload.groups) {
						groups = payload.groups;
						populateGroupSelect();
					}

					if (payload.event === "groupSaved") {
						if (payload.success) {
							showStatus("Group created!", false);
							createPanel.style.display = "none";
							// Reload groups
							client.sendToPlugin({ event: "getGroups" });
						} else {
							showStatus(payload.error || "Failed to save", true);
						}
					}

					if (payload.event === "groupDeleted") {
						if (payload.success) {
							showStatus("Group deleted", false);
							client.sendToPlugin({ event: "getGroups" });
						} else {
							showStatus(payload.error || "Failed to delete", true);
						}
					}

					if (payload.event === "getDevices" && payload.items) {
						devices = payload.items;
					}
				});

				// Restore selected group from settings
				client.didReceiveSettings.subscribe((msg) => {
					const s = msg.payload?.settings;
					if (s?.selectedGroupId && groupSelect) {
						groupSelect.value = s.selectedGroupId;
					}
					// Update conditional visibility
					const mode = s?.controlMode;
					if (mode) {
						const bi = document.getElementById("brightnessItem");
						const ci = document.getElementById("colorItem");
						const ti = document.getElementById("tempItem");
						if (bi) bi.style.display = mode === "brightness" ? "" : "none";
						if (ci) ci.style.display = mode === "color" ? "" : "none";
						if (ti) ti.style.display = mode === "colorTemp" ? "" : "none";
					}
				});

				// Fetch groups and devices
				client.sendToPlugin({ event: "getGroups" });
				client.sendToPlugin({ event: "getDevices" });
			}, 50);
		});
	</script>
</head>
<body>
	<div id="settings" class="hidden">
		<sdpi-item label="Group">
			<div class="group-header">
				<select id="groupSelect" class="sdpi-item-value select">
					<option value="">Select a group...</option>
				</select>
			</div>
			<div class="btn-row" style="margin-top:4px">
				<button id="createGroupBtn" class="btn-create">+ New Group</button>
				<button id="deleteGroupBtn" class="btn-cancel">Delete</button>
			</div>
		</sdpi-item>

		<!-- Inline group creation -->
		<div id="createGroupPanel" style="display:none">
			<sdpi-item label="Name">
				<input id="groupNameInput" class="group-name-input" type="text" placeholder="e.g. Living Room" />
			</sdpi-item>
			<sdpi-item label="Lights">
				<div id="lightList" class="light-list"></div>
			</sdpi-item>
			<sdpi-item label="">
				<div class="btn-row">
					<button id="saveGroupBtn" class="btn-create">Create</button>
					<button id="cancelGroupBtn" class="btn-cancel">Cancel</button>
				</div>
			</sdpi-item>
		</div>

		<div id="groupStatus"></div>

		<sdpi-item label="Action">
			<sdpi-select setting="controlMode" placeholder="" default="toggle">
				<option value="toggle">Toggle On/Off</option>
				<option value="on">Turn On</option>
				<option value="off">Turn Off</option>
				<option value="brightness">Set Brightness</option>
				<option value="color">Set Color</option>
				<option value="colorTemp">Set Color Temperature</option>
			</sdpi-select>
		</sdpi-item>

		<sdpi-item label="Brightness" id="brightnessItem" style="display:none">
			<sdpi-range setting="brightnessValue" default="50" min="0" max="100" step="1" showlabels></sdpi-range>
		</sdpi-item>

		<sdpi-item label="Color" id="colorItem" style="display:none">
			<sdpi-color setting="colorValue"></sdpi-color>
		</sdpi-item>

		<sdpi-item label="Temperature" id="tempItem" style="display:none">
			<sdpi-range setting="colorTempValue" default="50" min="0" max="100" step="1" showlabels>
				<span slot="min">Warm</span>
				<span slot="max">Cool</span>
			</sdpi-range>
		</sdpi-item>
	</div>

	<div id="setup" class="hidden">
		<sdpi-item label="API Key">
			<sdpi-password id="apiKey" global setting="unverifiedApiKey"
				placeholder="API key from Govee"></sdpi-password>
		</sdpi-item>
		<sdpi-item>
			<sdpi-button id="connect">Connect</sdpi-button>
			<div id="errorMessage" class="hidden">Failed to connect, please try again.</div>
		</sdpi-item>
		<sdpi-item label="Guide" class="guide">
			<ol>
				<li>Open the Govee app</li>
				<li>Go to settings</li>
				<li>Select "Apply for API Key"</li>
			</ol>
		</sdpi-item>
	</div>
</body>
</html>
