<!DOCTYPE html>
<html>
<head lang="en-gb">
	<meta charset="utf-8">
	<title>Govee Light Management | Segment Color</title>
	<link rel="stylesheet" href="./css/main.css" />
	<script src="./js/ws-bridge.js"></script>
	<script src="./js/sdpi-components.js"></script>
	<script src="./js/setup.js"></script>
</head>
<body>
	<div id="settings" class="hidden">
		<sdpi-item label="Device">
			<sdpi-select setting="selectedDeviceId" placeholder="" datasource="getDevices" show-refresh
				label-setting="selectedLightName"></sdpi-select>
		</sdpi-item>

		<sdpi-item label="Preset">
			<sdpi-select setting="preset" default="rainbow">
				<option value="rainbow">Rainbow</option>
				<option value="solid">Solid Color</option>
				<option value="gradient">Hue Gradient</option>
			</sdpi-select>
		</sdpi-item>

		<sdpi-item label="Segments">
			<sdpi-range setting="segmentCount" default="15" min="1" max="15" step="1" showlabels>
				<span slot="min">1</span>
				<span slot="max">15</span>
			</sdpi-range>
		</sdpi-item>

		<sdpi-item label="Solid Hue">
			<sdpi-range setting="hue" default="0" min="0" max="359" step="1" showlabels>
				<span slot="min">0°</span>
				<span slot="max">359°</span>
			</sdpi-range>
		</sdpi-item>

		<sdpi-item label="Gradient Start">
			<sdpi-range setting="hueStart" default="0" min="0" max="359" step="1" showlabels>
				<span slot="min">0°</span>
				<span slot="max">359°</span>
			</sdpi-range>
		</sdpi-item>

		<sdpi-item label="Gradient End">
			<sdpi-range setting="hueEnd" default="300" min="0" max="359" step="1" showlabels>
				<span slot="min">0°</span>
				<span slot="max">359°</span>
			</sdpi-range>
		</sdpi-item>
	</div>

	<div id="setup" class="hidden">
		<sdpi-item label="API Key">
			<sdpi-password id="apiKey" global setting="unverifiedApiKey"
				placeholder="API key from Govee"></sdpi-password>
		</sdpi-item>
		<sdpi-item>
			<sdpi-button id="connect">Connect</sdpi-button>
			<div id="errorMessage" class="hidden">Failed to connect, please try again.</div>
		</sdpi-item>
		<sdpi-item label="Guide" class="guide">
			<ol>
				<li>Open the Govee app</li>
				<li>Go to settings</li>
				<li>Select "Apply for API Key"</li>
			</ol>
		</sdpi-item>
	</div>
</body>
</html>
